<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua Compiler</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>Lua Compiler</h1>
        <p>Live Lua syntax highlighting, Roblox Lua checks, and error detection.</p>
      </div>
    </section>

    <section class="editor-shell">
      <div class="editor-top">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="file-name">main.lua</span>
        <span id="versionTag" class="version-tag">v1.1</span>
      </div>

      <div class="editor-wrap">
        <pre id="highlighting" aria-hidden="true"></pre>
        <textarea
          id="codeInput"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
          placeholder="Type your Lua code here..."
        ></textarea>
      </div>
    </section>

    <section class="output">
      <h2>Diagnostics</h2>
      <div id="status" class="status good">No errors detected.</div>
      <div id="diagnostics"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
