<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Night Lua Obfuscator</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<div class="app">
		<header>
			<div>
				<h1>Night Lua Obfuscator</h1>
				<p>Advanced browser Lua obfuscator with configurable settings.</p>
			</div>
			<span class="badge">GitHub Pages Ready</span>
		</header>

		<section class="settings">
			<label><input type="checkbox" id="renameVars" checked /> Rename local variables</label>
			<label><input type="checkbox" id="encodeStrings" checked /> Encode strings</label>
			<label><input type="checkbox" id="byteEncode" checked /> Byte encode final output</label>
			<label><input type="checkbox" id="junkCode" checked /> Add junk code</label>

			<label>
				Junk intensity
				<select id="junkIntensity">
					<option value="low">Low</option>
					<option value="medium" selected>Medium</option>
					<option value="high">High</option>
				</select>
			</label>
		</section>

		<div class="toolbar">
			<button onclick="obfuscateLua()">Obfuscate</button>
			<button onclick="minifyOnly()">Minify Only</button>
			<button onclick="copyOutput()">Copy Output</button>
			<button class="danger" onclick="clearAll()">Clear</button>
		</div>

		<main class="grid">
			<section class="panel">
				<div class="panel-title">Input Lua</div>
				<textarea id="input" placeholder="Paste Lua here..."></textarea>
			</section>

			<section class="panel">
				<div class="panel-title">Output</div>
				<textarea id="output" readonly placeholder="Obfuscated code appears here..."></textarea>
			</section>
		</main>

		<section class="messages" id="messages">
			Ready.
		</section>
	</div>

	<script src="script.js"></script>
</body>
</html>
